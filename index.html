<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello from OpenClaw!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #5B3CD6 0%, #8B63FF 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .container {
            text-align: center;
            padding: 40px 20px;
        }
        
        .hero {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 16px;
        }
        
        .icon {
            width: 64px;
            height: 64px;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.3));
        }
        
        h1 {
            font-size: 48px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .subtitle {
            font-size: 20px;
            font-weight: 400;
            opacity: 0.9;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .check {
            color: #2ECC71;
            font-size: 24px;
            background: rgba(46, 204, 113, 0.2);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        
        .details {
            margin-top: 40px;
            padding: 24px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .details h2 {
            font-size: 18px;
            margin-bottom: 12px;
            opacity: 0.95;
        }
        
        .details p {
            font-size: 14px;
            opacity: 0.8;
            line-height: 1.6;
        }
        
        .timestamp {
            margin-top: 24px;
            font-size: 12px;
            opacity: 0.6;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <svg class="icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <!-- Lobster/Claw mascot -->
                <ellipse cx="50" cy="55" rx="25" ry="30" fill="#E74C3C" stroke="#000" stroke-width="2"/>
                <ellipse cx="35" cy="45" rx="8" ry="10" fill="#C0392B" stroke="#000" stroke-width="1.5"/>
                <ellipse cx="65" cy="45" rx="8" ry="10" fill="#C0392B" stroke="#000" stroke-width="1.5"/>
                <circle cx="38" cy="42" r="3" fill="#000"/>
                <circle cx="62" cy="42" r="3" fill="#000"/>
                <path d="M45 55 Q50 60 55 55" stroke="#000" stroke-width="2" fill="none"/>
                <!-- Claws -->
                <path d="M25 50 Q10 40 15 25 Q20 35 25 40" fill="#E74C3C" stroke="#000" stroke-width="2"/>
                <path d="M75 50 Q90 40 85 25 Q80 35 75 40" fill="#E74C3C" stroke="#000" stroke-width="2"/>
                <!-- Legs -->
                <line x1="30" y1="70" x2="20" y2="85" stroke="#000" stroke-width="2"/>
                <line x1="40" y1="75" x2="35" y2="90" stroke="#000" stroke-width="2"/>
                <line x1="60" y1="75" x2="65" y2="90" stroke="#000" stroke-width="2"/>
                <line x1="70" y1="70" x2="80" y2="85" stroke="#000" stroke-width="2"/>
            </svg>
            <h1>Hello from OpenClaw!</h1>
        </div>
        
        <div class="subtitle">
            GitHub + Vercel deployment successful!
            <span class="check">✓</span>
        </div>
        
        <div class="details">
            <h2>Connection Verified</h2>
            <p>This page confirms that OpenClaw can successfully create GitHub repositories, push code, deploy to Vercel, and serve live sites.</p>
            <div class="timestamp">Deployed: <span id="timestamp"></span></div>
        </div>
    </div>
    
    <script>
        document.getElementById('timestamp').textContent = new Date().toLocaleString();
    </script>
</body>
</html>
